name: Flutter CI

on:
  pull_request:
    paths: ["app/**", ".github/workflows/flutter-ci.yml"]
  push:
    branches: [main]
    paths: ["app/**", ".github/workflows/flutter-ci.yml"]

jobs:
  analyze-and-test:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Env-Platzhalter anlegen
        run: cp .env.example .env

      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test
